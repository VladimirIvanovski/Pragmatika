version: '3.8'

services:
  web:
    build: .
    ports:
      - "5000:5000"
    volumes:
      - ./documents:/app/documents
      - ./static/extracted_images:/app/static/extracted_images
      - ./content:/app/content
    environment:
      - FLASK_ENV=production
      - PORT=5000
    restart: unless-stopped
